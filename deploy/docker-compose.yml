services:
  app:
    image: mini-agent-offline:local
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: ${PORT:-4319}
      WORKBENCH_DATA_DIR: /data
    ports:
      - "127.0.0.1:${PORT:-4319}:${PORT:-4319}"
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
